<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        body{
         background: radial-gradient(circle at center, #114281 0%, #051833 100%);
        }



        .responsive-form {
            display:flex;
            justify-content: center ;
            align-items:center;
            margin-top: 120px;
            
        }



        form {
            border-radius: 5px;
            background-color: #f2f2f2;
            padding: 20px;
            width: 50%;
            height:60vh;
            justify-content: center;
            align-items: center;
            background-position: center center;
        }

        label {
            display: block;
        }

        input[type=text],
        select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        input[type=submit] {
            width: 100%;
            background-color: #000000;
            color: white;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        textarea {
            width:97%;
            height:35%;
            margin-top:9px;



        }

        .gmail {
            width:100%;
            height: 7%;
            margin-top:6px;
            margin-bottom: 6px;
        }


        input[type=submit]:hover {
             background: radial-gradient(circle at center, #114281 0%, #051833 100%);
        }

    </style>



    <div class="responsive-form">

        <form action="/action_page.php">
            <label for="fname">Full Name:</label>
            <input type="text" id="fname" name="fname" placeholder="Your full name">

            <label for="gmail">Your Gmail:</label>
            <input class="gmail" type="gmail" id="gmail" name="gmail" placeholder="Your gmail">

            <label for="district">District:</label>
            <select id="district" name="district">
                <option value="bara">Bara</option>
                <option value="parsa">Parsa</option>
                <option value="lalitpur">Lalitpur</option>
            </select>

            <label for="message">Message or Feedback:</label>
            <textarea id="message" name="message" placeholder="Write something.."></textarea>

            <input type="submit" value="Submit">
        </form>
    </div>


</body>

</html>
